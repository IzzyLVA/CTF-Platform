<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Can You Find This Mountain?</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            color: #ffcc00;
        }
        p {
            font-size: 1.4em;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .image-container {
            margin: 30px auto;
            border: 8px solid #333;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.3);
            display: inline-block;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
        }
        .hint {
            margin-top: 40px;
            font-size: 1.1em;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌄 Can You Find This Mountain?</h1>
        <p>Identify the name of the mountain shown in the image below.</p>
        
        <div class="image-container">
            <img src="/static/Mt-Akina-at-night.jpg" alt="Mountain at night with winding road light trails">
        </div>

        <div class="hint">
            <p>Good luck, challenger! 🏔️</p>
        </div>
    </div>
</body>
</html>
